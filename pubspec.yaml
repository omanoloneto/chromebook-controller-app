name: controle_de_aula
description: "Controle de aula (app do celular): abre URLs nos Chromebooks e mostra abas/URLs visitadas, cifrado ponta-a-ponta via Firebase RTDB (funciona entre redes diferentes)."
publish_to: "none"
version: 0.8.0+8

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Criptografia ponta-a-ponta (AES-256-GCM) + handshake X25519/HKDF.
  cryptography: ^2.9.0
  # Utilidades de hash (HMAC/SHA-256).
  crypto: ^3.0.0
  # Persistir o par de chaves do professor entre execuções.
  path_provider: ^2.1.0
  # Foreground service: servidor vivo com a tela apagada.
  flutter_foreground_task: ^9.2.0
  # Escolher a imagem do papel de parede (Photo Picker, sem permissão runtime).
  image_picker: ^1.2.0
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  firebase_database: ^12.4.4
  mobile_scanner: ^7.2.0
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# Versões dos pacotes são um ponto de partida; ajuste com `flutter pub upgrade`.

flutter:
  uses-material-design: true
