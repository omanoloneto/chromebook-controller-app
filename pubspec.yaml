name: controle_de_aula
description: "Controle remoto do Chromebook do professor (app do celular). Função inicial: enviar URL/abrir aba via WebRTC na rede local."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Criptografia ponta-a-ponta (AES-256-GCM) + handshake X25519/HKDF.
  cryptography: ^2.9.0
  # Utilidades de hash (HMAC/SHA-256).
  crypto: ^3.0.0
  # Persistir o par de chaves do professor entre execuções.
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# Versões dos pacotes são um ponto de partida; ajuste com `flutter pub upgrade`.

flutter:
  uses-material-design: true
