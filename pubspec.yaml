name: controle_de_aula
description: "Controle remoto do Chromebook do professor (app do celular). Função inicial: enviar URL/abrir aba via WebRTC na rede local."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Geração do QR de pareamento (ip/porta/chave) mostrado ao Chromebook.
  qr_flutter: ^4.1.0
  # Criptografia ponta-a-ponta dos comandos (AES-256-GCM).
  cryptography: ^2.9.0
  # Utilidades de hash (HMAC/SHA-256).
  crypto: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# Versões dos pacotes são um ponto de partida; ajuste com `flutter pub upgrade`.

flutter:
  uses-material-design: true
